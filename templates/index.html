<!DOCTYPE html>
<html>
<head>
    <title>Flood Risk System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #eef6ff;
        }

        .box {
            background: white;
            width: 60%;
            margin: auto;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 10px;
            width: 60%;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .section {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>🌧️ Flood Risk System</h1>

    <input id="city" placeholder="Enter city">
    <button onclick="checkRisk()">Check</button>

    <h3 id="cityName"></h3>

    <div class="section" id="temp"></div>
    <div class="section" id="humidity"></div>
    <div class="section" id="rainfall"></div>
    <div class="section" id="risk"></div>
    <div class="section" id="route"></div>

    <hr>

    <h3>🚀 Future Improvements</h3>
    <ul>
        <li>Google Maps visualization</li>
        <li>AI-based prediction model</li>
        <li>SMS alerts for high-risk zones</li>
        <li>Historical rainfall analysis</li>
        <li>Real-time disaster monitoring</li>
    </ul>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
