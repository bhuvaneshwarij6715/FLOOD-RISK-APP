<!DOCTYPE html>
<html>
<head>
    <title>Flood Risk System 🌧️</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f6ff;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>🌧️ Flood Risk System</h2>

<div class="box">
    <input id="city" placeholder="Enter City">
    <br>
    <button onclick="checkRisk()">Check</button>

    <p>🌡️ Temp: <span id="temp">--</span></p>
    <p>💧 Humidity: <span id="hum">--</span></p>
    <p>🌧️ Rainfall: <span id="rain">--</span></p>
    <p>⚠️ Risk: <span id="risk">--</span></p>
    <p>🛣️ Route: <span id="route">--</span></p>
</div>

<script src="/static/script.js"></script>

</body>
</html>
